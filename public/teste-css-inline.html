<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Teste CSS Inline TV</title>
  <style>
    body { background: #222; color: #fff; font-family: Arial, sans-serif; }
    h1 { color: #4ade80; }
    .box { background: #333; padding: 20px; border-radius: 8px; margin: 20px 0; }
    .btn { background: #4ade80; color: #222; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; }
  </style>
</head>
<body>
  <h1>Teste de CSS Inline</h1>
  <div class="box">Se você está vendo este box estilizado, o CSS inline funciona na sua TV.</div>
  <button class="btn">Botão de Teste</button>
</body>
</html>
